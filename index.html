<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея Принцесс — 8 марта 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --rose-50: #fdf2f8;
            --rose-100: #fce7f3;
            --rose-200: #fbcfe8;
            --rose-300: #f9a8d4;
            --gold: #d4a853;
            --gold-light: #e8c97a;
            --white: #fffefb;
            --cream: #fef9f3;
            --text-dark: #4a3c3c;
            --shadow: rgba(212, 168, 83, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--rose-50) 50%, var(--cream) 100%);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 4rem 2rem 3rem;
            position: relative;
        }

        .header::after {
            content: '✿';
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            color: var(--gold);
            opacity: 0.7;
        }

        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }

        .header .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.2rem, 2.5vw, 1.6rem);
            font-style: italic;
            color: var(--gold);
            margin-bottom: 1.5rem;
        }

        .header .intro {
            font-size: 0.95rem;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.7;
            opacity: 0.9;
        }

        .qr-section {
            text-align: center;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .qr-section .qr-box {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            padding: 1.5rem;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 8px 30px var(--shadow);
            border: 1px solid rgba(212, 168, 83, 0.2);
        }

        .qr-section .qr-box img {
            width: 160px;
            height: 160px;
            border-radius: 8px;
        }

        .qr-section .qr-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .gallery-title {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 600;
            margin-bottom: 2.5rem;
            color: var(--text-dark);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto 4rem;
        }

        .card-wrapper {
            perspective: 1000px;
            min-height: 380px;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 0.8s ease forwards;
        }

        .card-wrapper.visible {
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            position: relative;
            width: 100%;
            height: 380px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-wrapper.flipped .card {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px var(--shadow);
        }

        .card-front {
            background: linear-gradient(180deg, var(--white) 0%, var(--rose-100) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(212, 168, 83, 0.2);
        }

        .card-front .photo,
        .card-front .photo-placeholder {
            cursor: pointer;
        }

        .card-front .photo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: #1a1a1a;
            margin-bottom: 1rem;
            object-fit: cover;
        }

        .card-front .photo-placeholder {
            background: #1a1a1a;
        }

        .card-front .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: center;
            padding: 0 0.5rem;
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, var(--rose-100) 0%, var(--rose-200) 50%, var(--rose-100) 100%);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid rgba(212, 168, 83, 0.25);
        }

        .card-back-decorations {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .card-back-decorations span {
            position: absolute;
            font-size: 1.1rem;
            opacity: 0.7;
            animation: floatDecor 4s ease-in-out infinite;
        }

        .card-back-decorations span:nth-child(1) { top: 8%; left: 6%; animation-delay: 0s; }
        .card-back-decorations span:nth-child(2) { top: 12%; right: 8%; animation-delay: 0.3s; }
        .card-back-decorations span:nth-child(3) { bottom: 25%; left: 5%; animation-delay: 0.6s; }
        .card-back-decorations span:nth-child(4) { bottom: 20%; right: 6%; animation-delay: 0.9s; }
        .card-back-decorations span:nth-child(5) { top: 45%; left: 3%; font-size: 1rem; animation-delay: 0.2s; }
        .card-back-decorations span:nth-child(6) { top: 50%; right: 4%; font-size: 1rem; animation-delay: 0.5s; }
        .card-back-decorations span:nth-child(7) { bottom: 8%; left: 15%; animation-delay: 0.8s; }
        .card-back-decorations span:nth-child(8) { bottom: 10%; right: 12%; animation-delay: 0.1s; }
        .card-back-decorations span:nth-child(9) { top: 8%; left: 44%; animation-delay: 0.4s; }
        .card-back-decorations span:nth-child(10) { bottom: 35%; right: 10%; animation-delay: 0.7s; }

        @keyframes floatDecor {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.05); }
        }

        .card-back::before {
            content: '💐';
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            opacity: 0.5;
        }

        .card-back .qualities {
            list-style: none;
        }

        .card-back .qualities li {
            padding: 0.4rem 0;
            padding-left: 1.5rem;
            position: relative;
            font-size: 0.9rem;
            line-height: 1.5;
            font-weight: 400;
        }

        .card-back .qualities li::before {
            content: '✦';
            position: absolute;
            left: 0;
            color: var(--gold);
            font-size: 0.8rem;
        }

        .card-back .name-back {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.8rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 1.5rem;
                padding: 1rem;
            }

            .card-wrapper, .card {
                height: 340px;
            }
        }

        .page-footer {
            text-align: center;
            font-size: 0.95rem;
            opacity: 0.5;
            color: var(--text-dark);
            padding: 0 1rem 0.5rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Наши Принцессы 11-Б</h1>
        <p class="subtitle">Галерея Принцесс • 1 Школа Лицея г. Костаная • 2026</p>
        <p class="intro">В этот весенний день мы хотим сказать каждой из вас: вы уникальны, прекрасны и достойны только самого лучшего. Спасибо, что делаете наш класс особенным! 💕</p>
    </header>
    <div class="cards-grid" id="cardsGrid"></div>
    <script>
        const SITE_URL = '';

        const queens = [
            { name: 'Юлия Николаевна', photoUrl: 'photo8marta/Yuliya.jpeg', qualities: ['Невероятная улыбка', 'Всегда поддержит', 'Творческая натура', 'Лучший учитель'] },
            { name: 'Айнура', photoUrl: 'photo8marta/Ainura.jpeg', qualities: ['Умница и красавица', 'Надёжный друг', 'Целеустремлённая', 'Элегантность во всём'] },
            { name: 'Зарина', photoUrl: 'photo8marta/Zarina.jpeg', qualities: ['Мудрая не по годам', 'Теплота и забота', 'Уникальный стиль', 'Вдохновляет других'] },
            { name: 'Жансая', photoUrl: 'photo8marta/Zhansaya.jpeg', qualities: ['Очаровательная', 'Отличное чувство юмора', 'Преданность близким', 'Сияет изнутри'] },
            { name: 'Наргиз', photoUrl: 'photo8marta/Nargiz.jpeg', qualities: ['Грациозная', 'Умная и весёлая', 'Настоящий друг', 'Вдохновляет мечтать'] },
            { name: 'Анеля', photoUrl: 'photo8marta/Anelya.jpeg', qualities: ['Королева элегантности', 'Невероятный талант', 'Тёплое сердце', 'Сияющие глаза'] },
            { name: 'Аружан', photoUrl: 'photo8marta/Arujan.jpeg', qualities: ['Золотое сердце', 'Талантливая', 'Добрая', 'Сияет изнутри'] },
            { name: 'Куралай', photoUrl: 'photo8marta/Kuralay.jpeg', qualities: ['Мудрая', 'Надёжный друг', 'Очаровательная', 'Вдохновляет других'] },
            { name: 'Анастасия', photoUrl: 'photo8marta/Anastasiya2.jpeg', qualities: ['Обаятельная', 'Надёжная подруга', 'Талантливая', 'Добрая душа'] },
            { name: 'Индира', photoUrl: 'photo8marta/Indira.jpeg', qualities: ['Сияющая улыбка', 'Целеустремлённая', 'Весёлый характер', 'Отзывчивая'] },
            { name: 'Анастасия', photoUrl: 'photo8marta/Anastasiya.jpeg', qualities: ['Элегантная', 'Умная', 'Вдохновляющая', 'Тёплое сердце'] },
            { name: 'Жамал', photoUrl: 'photo8marta/Djamal.jpeg', qualities: ['Яркая', 'Душа компании', 'Креативная', 'Всегда на позитиве'] },
            { name: 'Виктория', photoUrl: 'photo8marta/Viktoria.jpeg', qualities: ['Нежная и сильная', 'Всегда на позитиве', 'Талантливая', 'Лучик солнца в классе'] },
            { name: 'Вероника', photoUrl: 'photo8marta/Veronika.jpeg', qualities: ['Яркая личность', 'Креативный подход', 'Душа компании', 'Несёт добро'] },
            { name: 'Нурай', photoUrl: 'photo8marta/Nuray.jpeg', qualities: ['Невероятная', 'Творческая', 'Поддержит всегда', 'Лучик солнца'] },
            { name: 'Ксюша', photoUrl: 'photo8marta/Ksusha.jpeg', qualities: ['Грациозная', 'Умная и добрая', 'Настоящий друг', 'Элегантность во всём'] },
            { name: 'Лейла', photoUrl: 'photo8marta/Leyla.jpeg', qualities: ['Светлая душа', 'Отзывчивая', 'Талантливая', 'Душа компании'] },
            { name: 'Даяна', photoUrl: 'photo8marta/Dayana.jpeg', qualities: ['Милая', 'Целеустремлённая', 'Тёплая', 'Вдохновляет мечтать'] },
            { name: 'Кира', photoUrl: 'photo8marta/Kira.jpeg', qualities: ['Королевская осанка', 'Умница', 'Добрая и нежная', 'Сияющие глаза'] },
            { name: 'Аскарида', photoUrl: 'photo8marta/Askarida.jpeg', qualities: ['Король достыка', 'Сильнейший', '90 баллов ент', 'КМС по баскетболу'] },
        ];

        function createCard(queen, index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'card-wrapper';
            wrapper.style.animationDelay = `${index * 0.08}s`;
            wrapper.dataset.index = index;

            const photoUrl = queen.photoUrl || '';
            const photoHtml = photoUrl
                ? `<img class="photo" src="${photoUrl}" alt="${queen.name}">`
                : `<div class="photo photo-placeholder"></div>`;

            wrapper.innerHTML = `
                <div class="card">
                    <div class="card-face card-front">
                        ${photoHtml}
                        <span class="name">${queen.name}</span>
                    </div>
                    <div class="card-face card-back">
                        <div class="card-back-decorations" aria-hidden="true">
                            <span>🌸</span><span>❤️</span><span>💕</span><span>🌷</span><span>✨</span>
                            <span>💐</span><span>🌺</span><span>💗</span><span>🌼</span><span>❤️</span>
                        </div>
                        <div class="name-back">${queen.name}</div>
                        <ul class="qualities">
                            ${queen.qualities.map(q => `<li>${q}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;

            wrapper.style.cursor = 'pointer';
            wrapper.addEventListener('click', (e) => {
                wrapper.classList.toggle('flipped');
                const rect = wrapper.getBoundingClientRect();
                const x = (rect.left + rect.width / 2) / window.innerWidth;
                const y = (rect.top + rect.height / 2) / window.innerHeight;
                fireHearts({ x, y });
            });

            return wrapper;
        }

        function initCards() {
            const grid = document.getElementById('cardsGrid');
            queens.forEach((queen, i) => {
                grid.appendChild(createCard(queen, i));
            });
        }

        function initScrollAnimation() {
            const wrappers = document.querySelectorAll('.card-wrapper');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            wrappers.forEach(w => observer.observe(w));
        }

        function fireConfetti() {
            const duration = 3000;
            const end = Date.now() + duration;

            const frame = () => {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#f9a8d4', '#d4a853', '#fbcfe8', '#e8c97a']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#f9a8d4', '#d4a853', '#fbcfe8', '#e8c97a']
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            };
            frame();

            setTimeout(() => {
                confetti({
                    particleCount: 80,
                    spread: 100,
                    origin: { y: 0.6 },
                    colors: ['#f9a8d4', '#d4a853', '#fbcfe8']
                });
            }, 500);
        }

        function fireHearts(origin) {
            const heartColors = ['#ff69b4', '#ff1493', '#f9a8d4', '#fbcfe8', '#e11d48', '#fb7185'];
            let shapes = ['circle', 'star'];
            try {
                if (typeof confetti.shapeFromText === 'function') {
                    shapes = [confetti.shapeFromText({ text: '❤️', scalar: 0.8 }), confetti.shapeFromText({ text: '💕', scalar: 0.8 })];
                }
            } catch (e) {}
            confetti({
                particleCount: 40,
                spread: 70,
                origin: origin,
                colors: heartColors,
                shapes: shapes,
                scalar: 1.1,
                startVelocity: 35,
                gravity: 0.8,
                drift: 0.2,
                ticks: 180
            });
        }

        function initQR() {
            const url = SITE_URL || window.location.href;
            const qrImage = document.getElementById('qrImage');
            const qrLabel = document.querySelector('.qr-label');

            qrImage.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url);

            if (url.startsWith('file://')) {
                qrLabel.textContent = 'Опубликуй сайт (GitHub Pages, Netlify) — тогда QR будет вести сюда';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initCards();
            initScrollAnimation();
            initQR();
            fireConfetti();
        });
    </script>

    <footer class="page-footer">Made by Али и его команда</footer>
</body>
</html>
